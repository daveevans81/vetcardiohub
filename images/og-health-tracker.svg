<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12245a"/>
      <stop offset="0.55" stop-color="#1e40af"/>
      <stop offset="1" stop-color="#16308a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4f74d8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4f74d8" stop-opacity="0"/>
    </radialGradient>

    <!-- feature icons (white line art, centred on 0,0) -->
    <g id="ic-vaccine" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <g transform="rotate(-45)">
        <rect x="-13" y="-6" width="19" height="12" rx="2.5"/>
        <line x1="6" y1="0" x2="15" y2="0"/>
        <line x1="12" y1="-4" x2="12" y2="4"/>
        <line x1="-13" y1="0" x2="-21" y2="0"/>
        <line x1="-7" y1="-6" x2="-7" y2="6"/>
        <line x1="-1" y1="-6" x2="-1" y2="6"/>
      </g>
    </g>
    <g id="ic-parasite" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0,-16 L13,-11 V2 C13,10 7,15 0,18 C-7,15 -13,10 -13,2 V-11 Z"/>
      <path d="M-6,0 L-1,6 L7,-6"/>
    </g>
    <g id="ic-weight" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-14,5 A14,14 0 0 1 14,5"/>
      <line x1="0" y1="5" x2="7" y2="-8"/>
      <circle cx="0" cy="5" r="2.4" fill="#ffffff" stroke="none"/>
    </g>
    <g id="ic-med" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <g transform="rotate(-35)">
        <rect x="-15" y="-7.5" width="30" height="15" rx="7.5"/>
        <line x1="0" y1="-7.5" x2="0" y2="7.5"/>
      </g>
    </g>
    <g id="ic-breath" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-16,0 L-8,0 L-4,-11 L0,11 L4,-7 L8,0 L16,0"/>
    </g>
    <g id="ic-seizure">
      <path d="M3,-16 L-9,3 L-1,3 L-4,16 L10,-4 L1,-4 Z" fill="#ffffff"/>
    </g>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- hero logo -->
  <ellipse cx="965" cy="215" rx="205" ry="205" fill="url(#glow)"/>
  <image xlink:href="logo-placeholder.png" href="logo-placeholder.png" x="800" y="55" width="330" height="330"/>

  <!-- wordmark top-left -->
  <image xlink:href="logo-placeholder.png" href="logo-placeholder.png" x="66" y="42" width="60" height="60"/>
  <text x="140" y="83" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="34" font-weight="bold" fill="#ffffff">VetCardioHub</text>

  <!-- headline -->
  <text x="70" y="238" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="66" font-weight="bold" fill="#ffffff">Your Pet's Complete</text>
  <text x="70" y="312" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="66" font-weight="bold" fill="#93b4ff">Health Record</text>

  <!-- subhead -->
  <text x="72" y="368" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="27" fill="#d3ddf5">One free, private tracker for your pet's whole health.</text>

  <!-- feature strip -->
  <g>
    <!-- tiles at x: 70,252,434,616,798,980  width 150 -->
    <g transform="translate(70,438)">
      <rect width="150" height="120" rx="16" fill="#ffffff" fill-opacity="0.11" stroke="#ffffff" stroke-opacity="0.18"/>
      <g transform="translate(75,48)"><use href="#ic-vaccine"/></g>
      <text x="75" y="98" text-anchor="middle" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="20" fill="#ffffff">Vaccines</text>
    </g>
    <g transform="translate(252,438)">
      <rect width="150" height="120" rx="16" fill="#ffffff" fill-opacity="0.11" stroke="#ffffff" stroke-opacity="0.18"/>
      <g transform="translate(75,48)"><use href="#ic-parasite"/></g>
      <text x="75" y="98" text-anchor="middle" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="20" fill="#ffffff">Parasites</text>
    </g>
    <g transform="translate(434,438)">
      <rect width="150" height="120" rx="16" fill="#ffffff" fill-opacity="0.11" stroke="#ffffff" stroke-opacity="0.18"/>
      <g transform="translate(75,48)"><use href="#ic-weight"/></g>
      <text x="75" y="98" text-anchor="middle" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="20" fill="#ffffff">Weight</text>
    </g>
    <g transform="translate(616,438)">
      <rect width="150" height="120" rx="16" fill="#ffffff" fill-opacity="0.11" stroke="#ffffff" stroke-opacity="0.18"/>
      <g transform="translate(75,48)"><use href="#ic-med"/></g>
      <text x="75" y="98" text-anchor="middle" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="20" fill="#ffffff">Medication</text>
    </g>
    <g transform="translate(798,438)">
      <rect width="150" height="120" rx="16" fill="#ffffff" fill-opacity="0.11" stroke="#ffffff" stroke-opacity="0.18"/>
      <g transform="translate(75,48)"><use href="#ic-breath"/></g>
      <text x="75" y="98" text-anchor="middle" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="20" fill="#ffffff">Breathing</text>
    </g>
    <g transform="translate(980,438)">
      <rect width="150" height="120" rx="16" fill="#ffffff" fill-opacity="0.11" stroke="#ffffff" stroke-opacity="0.18"/>
      <g transform="translate(75,48)"><use href="#ic-seizure"/></g>
      <text x="75" y="98" text-anchor="middle" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="20" fill="#ffffff">Seizures</text>
    </g>
  </g>
</svg>
