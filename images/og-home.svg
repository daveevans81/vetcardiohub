<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12245a"/>
      <stop offset="0.55" stop-color="#1e40af"/>
      <stop offset="1" stop-color="#16308a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4f74d8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4f74d8" stop-opacity="0"/>
    </radialGradient>

    <!-- Health Tracker: heart outline + pulse -->
    <g id="ic-track" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0,14 C-14,3 -18,-6 -13,-12 C-9,-17 -2,-15 0,-9 C2,-15 9,-17 13,-12 C18,-6 14,3 0,14 Z"/>
      <path d="M-11,-2 L-5,-2 L-2,-8 L2,5 L5,-3 L8,-2 L12,-2" stroke-width="2.4"/>
    </g>
    <!-- Echo Calculator -->
    <g id="ic-calc" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-14" y="-17" width="28" height="34" rx="4"/>
      <rect x="-9" y="-13" width="18" height="8" rx="1.5"/>
      <g fill="#ffffff" stroke="none">
        <circle cx="-8" cy="2" r="1.9"/><circle cx="0" cy="2" r="1.9"/><circle cx="8" cy="2" r="1.9"/>
        <circle cx="-8" cy="10" r="1.9"/><circle cx="0" cy="10" r="1.9"/><circle cx="8" cy="10" r="1.9"/>
      </g>
    </g>
    <!-- Learning Hub: graduation cap -->
    <g id="ic-learn" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0,-14 L19,-6 L0,2 L-19,-6 Z"/>
      <path d="M-10,-2 L-10,8 C-10,12 10,12 10,8 L10,-2"/>
      <line x1="19" y1="-6" x2="19" y2="7"/>
      <circle cx="19" cy="9" r="2.1" fill="#ffffff" stroke="none"/>
    </g>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- hero logo -->
  <ellipse cx="965" cy="205" rx="205" ry="205" fill="url(#glow)"/>
  <image xlink:href="logo-placeholder.png" href="logo-placeholder.png" x="800" y="45" width="330" height="330"/>

  <!-- wordmark -->
  <image xlink:href="logo-placeholder.png" href="logo-placeholder.png" x="66" y="42" width="60" height="60"/>
  <text x="140" y="83" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="34" font-weight="bold" fill="#ffffff">VetCardioHub</text>

  <!-- headline -->
  <text x="70" y="228" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="62" font-weight="bold" fill="#ffffff">Veterinary Cardiology</text>
  <text x="70" y="298" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="62" font-weight="bold" fill="#93b4ff">Tools &amp; Guides</text>

  <!-- subhead -->
  <text x="72" y="352" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="26" fill="#d3ddf5">For pet owners and veterinary professionals.</text>

  <!-- three pillar tiles: width 320 at x 70,440,810 -->
  <g>
    <g transform="translate(70,428)">
      <rect width="320" height="132" rx="18" fill="#ffffff" fill-opacity="0.11" stroke="#ffffff" stroke-opacity="0.18"/>
      <g transform="translate(52,66)"><use href="#ic-track"/></g>
      <text x="92" y="58" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="26" font-weight="bold" fill="#ffffff">Health Tracker</text>
      <text x="92" y="88" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="18" fill="#c7d6ff">for pet owners</text>
    </g>
    <g transform="translate(440,428)">
      <rect width="320" height="132" rx="18" fill="#ffffff" fill-opacity="0.11" stroke="#ffffff" stroke-opacity="0.18"/>
      <g transform="translate(52,66)"><use href="#ic-calc"/></g>
      <text x="92" y="58" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="26" font-weight="bold" fill="#ffffff">Echo Calculator</text>
      <text x="92" y="88" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="18" fill="#c7d6ff">for veterinary teams</text>
    </g>
    <g transform="translate(810,428)">
      <rect width="320" height="132" rx="18" fill="#ffffff" fill-opacity="0.11" stroke="#ffffff" stroke-opacity="0.18"/>
      <g transform="translate(52,66)"><use href="#ic-learn"/></g>
      <text x="92" y="58" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="26" font-weight="bold" fill="#ffffff">Learning Hub</text>
      <text x="92" y="88" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="18" fill="#c7d6ff">interactive glossary</text>
    </g>
  </g>
</svg>
