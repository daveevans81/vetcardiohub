<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2150"/>
      <stop offset="0.55" stop-color="#1b3a9c"/>
      <stop offset="1" stop-color="#132c7d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4f74d8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4f74d8" stop-opacity="0"/>
    </radialGradient>

    <g id="ic-ruler" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-17" y="-8" width="34" height="16" rx="2.5"/>
      <line x1="-9" y1="-8" x2="-9" y2="-1"/>
      <line x1="-1" y1="-8" x2="-1" y2="2"/>
      <line x1="7" y1="-8" x2="7" y2="-1"/>
    </g>
    <g id="ic-target" fill="none" stroke="#ffffff" stroke-width="2.6">
      <circle cx="0" cy="0" r="15"/>
      <circle cx="0" cy="0" r="8"/>
      <circle cx="0" cy="0" r="2.2" fill="#ffffff" stroke="none"/>
    </g>
    <g id="ic-flow" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <line x1="-16" y1="-6" x2="14" y2="-6"/>
      <polyline points="8,-12 16,-6 8,0"/>
      <line x1="16" y1="8" x2="-14" y2="8"/>
      <polyline points="-8,2 -16,8 -8,14"/>
    </g>
    <g id="ic-ea" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-17,8 Q-9,-13 -1,8 Q6,-6 13,8 L17,8"/>
    </g>
    <g id="ic-mag" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-3,-14 C-9,-19 -17,-15 -17,-8 C-17,-1 -9,6 -3,11 C3,6 11,-1 11,-8 C11,-15 3,-19 -3,-14 Z" transform="translate(-1,-1) scale(0.8)"/>
      <circle cx="7" cy="7" r="7"/>
      <line x1="12" y1="12" x2="18" y2="18"/>
    </g>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- hero logo -->
  <ellipse cx="965" cy="215" rx="205" ry="205" fill="url(#glow)"/>
  <image xlink:href="logo-placeholder.png" href="logo-placeholder.png" x="800" y="55" width="330" height="330"/>

  <!-- wordmark -->
  <image xlink:href="logo-placeholder.png" href="logo-placeholder.png" x="66" y="42" width="60" height="60"/>
  <text x="140" y="83" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="34" font-weight="bold" fill="#ffffff">VetCardioHub</text>

  <!-- headline -->
  <text x="70" y="238" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="62" font-weight="bold" fill="#ffffff">Advanced Veterinary</text>
  <text x="70" y="308" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="62" font-weight="bold" fill="#93b4ff">Echo Calculator</text>

  <!-- subhead -->
  <text x="72" y="364" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="26" fill="#d3ddf5">A free clinical toolkit for veterinary echocardiography.</text>

  <!-- feature strip: 5 tiles width 168 at x 70,293,516,739,962 -->
  <g>
    <g transform="translate(70,438)">
      <rect width="168" height="120" rx="16" fill="#ffffff" fill-opacity="0.11" stroke="#ffffff" stroke-opacity="0.18"/>
      <g transform="translate(84,48)"><use href="#ic-ruler"/></g>
      <text x="84" y="98" text-anchor="middle" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="19" fill="#ffffff">Allometric</text>
    </g>
    <g transform="translate(293,438)">
      <rect width="168" height="120" rx="16" fill="#ffffff" fill-opacity="0.11" stroke="#ffffff" stroke-opacity="0.18"/>
      <g transform="translate(84,48)"><use href="#ic-target"/></g>
      <text x="84" y="98" text-anchor="middle" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="19" fill="#ffffff">MINE score</text>
    </g>
    <g transform="translate(516,438)">
      <rect width="168" height="120" rx="16" fill="#ffffff" fill-opacity="0.11" stroke="#ffffff" stroke-opacity="0.18"/>
      <g transform="translate(84,48)"><use href="#ic-flow"/></g>
      <text x="84" y="98" text-anchor="middle" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="19" fill="#ffffff">Qp:Qs shunt</text>
    </g>
    <g transform="translate(739,438)">
      <rect width="168" height="120" rx="16" fill="#ffffff" fill-opacity="0.11" stroke="#ffffff" stroke-opacity="0.18"/>
      <g transform="translate(84,48)"><use href="#ic-ea"/></g>
      <text x="84" y="98" text-anchor="middle" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="19" fill="#ffffff">Diastolic</text>
    </g>
    <g transform="translate(962,438)">
      <rect width="168" height="120" rx="16" fill="#ffffff" fill-opacity="0.11" stroke="#ffffff" stroke-opacity="0.18"/>
      <g transform="translate(84,48)"><use href="#ic-mag"/></g>
      <text x="84" y="98" text-anchor="middle" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="19" fill="#ffffff">HCM screen</text>
    </g>
  </g>
</svg>
