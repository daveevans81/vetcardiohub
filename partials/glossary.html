<style>
    /* Glossary specific styles to ensure it renders correctly on all pages */
    .glossary-overlay {
        position: fixed; inset: 0; z-index: 10300;
        display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .glossary-backdrop {
        position: absolute; inset: 0;
        background-color: rgba(15, 23, 42, 0.6); 
        backdrop-filter: blur(2px);
    }
    .glossary-modal {
        position: relative; background-color: #ffffff !important; 
        width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto;
        border-radius: 12px; z-index: 10400;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
</style>

<div x-show="glossaryOpen" 
     class="glossary-overlay"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     @keydown.escape.window="closeGlossary()"
     style="display: none;" x-cloak>
    
    <div class="glossary-backdrop" @click="closeGlossary()"></div>

    <div class="card glossary-modal" 
         x-show="glossaryOpen"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 transform translate-y-4 sm:translate-y-0 sm:scale-95"
         x-transition:enter-end="opacity-100 transform translate-y-0 sm:scale-100"
         @click.stop>
        
        <header class="glossary-header" style="display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #e2e8f0;">
            <div>
                <h3 class="glossary-title" style="margin: 0; display: flex; align-items: center; gap: 8px;">
                    <i class="fa-solid fa-book-medical" style="color: #0ea5e9;"></i>
                    <span x-text="activeGlossaryTerm?.title"></span>
                </h3>
                <span x-show="activeGlossaryTerm?.category" 
                      style="display: inline-block; background: #e0f2fe; color: #0284c7; padding: 3px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; margin-top: 5px; text-transform: uppercase;" 
                      x-text="activeGlossaryTerm?.category"></span>
            </div>
            <button @click="closeGlossary()" class="glossary-close" aria-label="Close" style="background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #94a3b8;">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </header>

        <div class="glossary-modal-body" style="padding: 20px;">
            
            <template x-if="activeGlossaryTerm?.imgPlaceholder">
                <div class="glossary-image-container" style="margin-bottom: 20px; text-align: center;">
                    <img :src="activeGlossaryTerm.imgPlaceholder" 
                         class="glossary-img clickable" 
                         @click="zoomImage(activeGlossaryTerm.imgPlaceholder)"
                         alt="Diagnostic reference diagram"
                         style="max-width: 100%; border-radius: 6px; border: 1px solid #cbd5e1; cursor: zoom-in;">
                    
                    <template x-if="activeGlossaryTerm?.imgAttribution">
                        <p class="image-attribution" style="font-size: 0.8rem; color: #64748b; margin-top: 8px;">
                            Source: <span x-text="activeGlossaryTerm.reference"></span>. 
                            Licensed <span x-text="activeGlossaryTerm.imgAttribution"></span>. 
                            <template x-if="activeGlossaryTerm?.pmid">
                                <a :href="`https://pubmed.ncbi.nlm.nih.gov/${activeGlossaryTerm.pmid}/`" 
                                   target="_blank" rel="noopener noreferrer" style="color: #0ea5e9;">
                                   [PMID: <span x-text="activeGlossaryTerm.pmid"></span>]
                                </a>
                            </template>
                        </p>
                    </template>
                </div>
            </template>
            
            <div class="glossary-content" style="display: flex; flex-direction: column; gap: 15px;">
                <template x-for="field in dynamicGlossaryFields()" :key="field.id">
                    
                    <div class="glossary-row" style="display: flex; gap: 12px; align-items: flex-start; padding-bottom: 15px; border-bottom: 1px solid #f1f5f9;">
                        
                        <i :class="`fa-solid ${field.icon} glossary-icon`" :style="`color: ${field.color}; margin-top: 4px; font-size: 1.1rem;`"></i>
                        
                        <div class="glossary-text-block" style="flex: 1;">
                            <span class="glossary-label" style="display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #64748b; margin-bottom: 4px;" x-text="field.label"></span>
                            <div class="glossary-desc" style="font-size: 0.95rem; color: #1e293b; line-height: 1.5;" x-html="field.value"></div>
                        </div>
                        
                    </div>
                    
                </template>
            </div>
            <template x-if="activeGlossaryTerm?.article">
                <div style="margin-top: 25px; padding-top: 20px; border-top: 2px dashed #cbd5e1; text-align: center;">
                    <p style="font-size: 0.85rem; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px;">
                        Want to learn more?
                    </p>
                    <a :href="activeGlossaryTerm.article" 
                       target="_blank" 
                       style="display: inline-flex; align-items: center; gap: 10px; background: #0f172a; color: #ffffff; padding: 12px 28px; border-radius: 8px; font-weight: 700; text-decoration: none; font-size: 1rem; transition: transform 0.2s, background 0.2s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);"
                       onmouseover="this.style.background='#1e293b'; this.style.transform='translateY(-2px)'"
                       onmouseout="this.style.background='#0f172a'; this.style.transform='translateY(0)'">
                        <i class="fa-solid fa-book-open-reader"></i> Read Full Deep-Dive Article
                    </a>
                </div>
            </template>
        </div>
    </div>
</div>
  
<div x-data="{ zoomedImg: null }" 
     @image-zoom.window="zoomedImg = $event.detail"
     x-show="zoomedImg"
     x-cloak
     x-transition.opacity.duration.300ms
     class="zoom-overlay" 
     @click="zoomedImg = null"
     style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10050; display: flex; align-items: center; justify-content: center; padding: 20px;">
    
    <img :src="zoomedImg" 
         class="zoomed-img" 
         @click.stop 
         style="width: 100%; height: 100%; max-width: 95vw; max-height: 90vh; object-fit: contain;">
    
    <button @click="zoomedImg = null" style="position: absolute; top: 20px; right: 25px; background: none; border: none; color: white; font-size: 2.2rem; cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
        <i class="fa-solid fa-xmark"></i>
    </button>
</div>
